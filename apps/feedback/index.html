<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0b0b0d" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta
      name="description"
      content="Pulse Feedback — share ideas, upvote what matters, track proposals."
    />

    <!-- Social share defaults. Noindex still applies; OG is for direct-link
         previews (Slack, iMessage, LinkedIn) and AI agents that crawl regardless. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pulse HR" />
    <meta property="og:title" content="Pulse Feedback — the wall that listens" />
    <meta property="og:description" content="Share ideas, upvote what matters, track proposals." />
    <meta property="og:image" content="https://pulsehr.it/og/og-hero.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@pulsehr_it" />
    <meta name="twitter:title" content="Pulse Feedback — the wall that listens" />
    <meta name="twitter:description" content="Share ideas, upvote what matters, track proposals." />
    <meta name="twitter:image" content="https://pulsehr.it/og/og-hero.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse Feedback" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Pulse Feedback" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <title>Pulse · Feedback</title>
    <style>
      html,
      body {
        background-color: #0b0b0d;
        color: #f2f2ee;
      }
    </style>
    <script>
      // Feedback is dark-only — paint dark before React mounts.
      (function () {
        try {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.dataset.density = "comfortable";
          document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
