<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0b0b0d" />
    <meta
      name="description"
      content="Pulse HR is a modern HR, payroll and people platform for teams that want one surface instead of six."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse HR" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Pulse HR" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <title>Pulse HR — Modern HR & Payroll</title>
    <style>
      /* Paint the dark canvas before any CSS loads so the PWA splash and
         initial route don't flash white on first paint. */
      html,
      body {
        background-color: #0b0b0d;
        color: #f2f2ee;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background-color: #fafaf7;
        color: #1a1a1d;
      }
    </style>
    <script>
      // Flash-prevention: set the theme on <html> before React paints. Two
      // themes only — light and dark — both with lime as the spark.
      (function () {
        try {
          var stored = localStorage.getItem("pulse.theme");
          var t = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.dataset.theme = t;
          document.documentElement.dataset.density = "comfortable";
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- GA4: init in main.tsx (first import) so gtag runs before React -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
