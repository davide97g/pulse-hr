<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1080, initial-scale=1" />
    <title>Pulse HR · Reel 001 — Render</title>

    <!-- Google Fonts: Fraunces / Inter (Geist substitute) / JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0b0b0d;
        color: #f2f2ee;
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
      }
      body {
        width: 1080px;
        height: 1920px;
      }
      #root {
        position: fixed;
        inset: 0;
        width: 1080px;
        height: 1920px;
      }
      /* Hide font note, tweaks, playback bar during render */
      .font-note,
      .tweaks {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="../prototype/lib/animations.jsx"></script>
    <script type="text/babel" src="../prototype/scenes.jsx"></script>

    <script type="text/babel">
      // Deterministic-time RenderStage — drop-in replacement for Stage.
      // Time is controlled by window.__setTime(t), called by the Playwright driver.
      // No requestAnimationFrame, no autoplay, no localStorage persistence.
      function RenderStage({
        width = 1080,
        height = 1920,
        duration = 15,
        background = "#0b0b0d",
        children,
      }) {
        const [time, setTime] = React.useState(0);

        React.useEffect(() => {
          window.__setTime = (t) => {
            setTime(Math.max(0, Math.min(duration, t)));
          };
          window.__duration = duration;
          window.__ready = true;
        }, [duration]);

        const ctxValue = React.useMemo(
          () => ({ time, duration, playing: false, setTime }),
          [time, duration],
        );

        return (
          <div
            style={{
              width,
              height,
              background,
              position: "relative",
              overflow: "hidden",
              fontFamily: "Inter, system-ui, sans-serif",
            }}
          >
            <TimelineContext.Provider value={ctxValue}>{children}</TimelineContext.Provider>
          </div>
        );
      }

      // Mount the reel directly on the render stage.
      function App() {
        return (
          <RenderStage width={1080} height={1920} duration={15} background="#0b0b0d">
            <ReelScene />
          </RenderStage>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
