name: cron - send pending emails
# Fires every 5 minutes (GitHub's scheduled workflow minimum). Drains the
# email outbox via /cron/send-pending. The backend caps batch size and
# respects the Resend 100-per-day free tier.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: POST /cron/send-pending
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error ::API_BASE_URL or CRON_SECRET secret is missing"
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST \
            -H "authorization: Bearer $CRON_SECRET" \
            "${API_BASE_URL%/}/cron/send-pending"
