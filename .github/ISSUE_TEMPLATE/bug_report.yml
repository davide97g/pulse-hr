name: 🐛 Bug report
description: Something is broken or behaving unexpectedly.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill this out so we can reproduce and fix fast.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear, concrete description. What did you do, what did you expect, what did you see?
      placeholder: I clicked X and expected Y, but Z happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal repro. Numbered steps preferred.
      placeholder: |
        1. Go to /employees
        2. Click "Add"
        3. See error
    validations:
      required: true
  - type: input
    id: affected
    attributes:
      label: Affected area
      description: Which app/route? e.g. `apps/app` /forecast, `apps/api` /v1/leave
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git commit SHA, package version, or "latest main".
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, browser, Bun version (`bun --version`)
      placeholder: macOS 15 · Chrome 132 · Bun 1.3.11
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste errors or drag-drop screenshots.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: This is not a security issue (those go to security@pulsehr.it).
          required: true
