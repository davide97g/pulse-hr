name: ✨ Feature request
description: Propose a new feature or enhancement. For open-ended ideas, prefer Discussions.
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Prefer [Discussions](https://github.com/davide97g/pulse-hr/discussions) for early-stage ideas — use this template when you have a concrete proposal.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches, flows, or API shape welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, related issues.
