version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/apps/app"
    schedule: { interval: weekly }
    labels: [dependencies, app]
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/apps/api"
    schedule: { interval: weekly }
    labels: [dependencies, api]
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/apps/marketing"
    schedule: { interval: weekly }
    labels: [dependencies, marketing]
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    labels: [dependencies, ci]
